<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>शुभ दीपावली - दीपावली की हार्दिक शुभकामनाएं!</title>

    <!-- Open Graph Meta Tags for Social Media Links -->
    <meta property="og:title" content="शुभ दीपावली! आपके लिए एक खास संदेश है।">
    <meta property="og:description" content="लिंक पर क्लिक करें और देखें किसने आपके लिए बधाई संदेश भेजा है।">
    <meta property="og:image" content="1000029603.jpg">
    <meta property="og:type" content="website">

    <style>
        /* --- CSS Reset & Variables --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        :root {
            --bg-dark: #120002;
            --gold: #ffd700;
            --gold-glow: #ffae00;
            --whatsapp-green: #25D366;
            --whatsapp-hover: #20ba5a;
            --text-white: #ffffff;
        }

        body {
            background: radial-gradient(circle, #2a0004 0%, var(--bg-dark) 100%);
            color: var(--text-white);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-start; /* स्क्रॉल होने पर भी चीजें ऊपर से शुरू हों */
            align-items: center;
            overflow-x: hidden;
            overflow-y: auto; /* पूरी स्क्रीन को आसानी से स्क्रॉल करने देने के लिए */
            padding: 15px;
            position: relative;
        }

        /* --- पटाखे अब कार्ड के आगे (Foreground) फूटेंगे --- */
        #fireworksCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 999;
        }

        /* --- AD कंटेनर पर नियॉन आउटलाइन और ग्लो प्रभाव --- */
        .ad-container {
            margin: 15px auto;
            text-align: center;
            z-index: 10;
            max-width: 100%;
            padding: 5px;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 8px;
            border: 2px solid var(--gold);
            box-shadow: 0 0 15px var(--gold-glow), inset 0 0 10px rgba(255, 215, 0, 0.3);
            display: inline-block;
        }

        /* --- Mobile-First Card Design (कोई एलिमेंट गायब नहीं होगा) --- */
        .card {
            position: relative;
            z-index: 10;
            background: rgba(28, 2, 5, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            width: 100%;
            max-width: 430px;
            padding: 25px 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            animation: fadeInCard 1s ease-out;
            margin: 10px 0;
            /* यहाँ से max-height और overflow को हटा दिया गया है ताकि नीचे का भाग कभी न छुपे */
        }

        @keyframes fadeInCard {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* GIF Container */
        .image-container {
            width: 100%;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.2);
            margin-bottom: 18px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.6);
            background: #000;
        }

        .image-container img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* --- Glowing Text --- */
        .glowing-text {
            color: var(--gold);
            text-shadow: 0 0 8px var(--gold-glow), 0 0 15px #ff4500;
            animation: textPulse 1.5s infinite alternate;
        }

        @keyframes textPulse {
            from { text-shadow: 0 0 8px var(--gold-glow), 0 0 15px #ff4500; }
            to { text-shadow: 0 0 18px var(--gold-glow), 0 0 30px #ff1a00, 0 0 45px var(--gold); }
        }

        .dynamic-name {
            font-size: 1.5rem;
            margin-bottom: 5px;
            font-weight: bold;
            min-height: 35px;
            color: #ffffff;
        }

        .main-title {
            font-size: 2.8rem;
            margin-bottom: 15px;
            letter-spacing: 1px;
        }

        /* Wish Message Box */
        .wish-box {
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.1), rgba(255, 69, 0, 0.05));
            border: 1px solid rgba(255, 215, 0, 0.3);
            border-left: 5px solid var(--gold);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .wish-box p {
            font-size: 1.15rem;
            line-height: 1.6;
            color: #fff0f0;
            font-weight: 500;
        }

        /* --- Form Inputs --- */
        .form-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            text-align: left;
        }

        .form-container label {
            font-size: 1rem;
            color: #ffcccc;
            font-weight: 500;
            padding-left: 2px;
        }

        .form-container input[type="text"] {
            width: 100%;
            padding: 14px;
            border: 2px solid rgba(255, 215, 0, 0.4);
            background: rgba(0, 0, 0, 0.5);
            color: #fff;
            border-radius: 10px;
            font-size: 1.1rem;
            text-align: center;
            outline: none;
            transition: all 0.3s ease;
        }

        .form-container input[type="text"]:focus {
            border-color: var(--gold);
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.6);
            background: rgba(0, 0, 0, 0.7);
        }

        /* --- Green WhatsApp Button --- */
        .whatsapp-btn {
            width: 100%;
            background-color: var(--whatsapp-green);
            color: white;
            border: none;
            padding: 15px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 4px 20px rgba(37, 211, 102, 0.4);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            margin-top: 5px;
        }

        .whatsapp-btn:hover {
            background-color: var(--whatsapp-hover);
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(37, 211, 102, 0.6);
        }

        .whatsapp-icon {
            width: 26px;
            height: 26px;
        }
    </style>
</head>
<body>

    <!-- बैकग्राउंड म्यूजिक -->
    <audio id="bg-music" src="music.mp3" loop></audio>

    <!-- स्मूथ आतिशबाज़ी कैनवास -->
    <canvas id="fireworksCanvas"></canvas>

    <!-- ⬇️ TOP BANNER AD ⬇️ -->
    <div class="ad-container">
        <script type="text/javascript">
          atOptions = {
            'key' : '16344688721b10a78e66849f98560991',
            'format' : 'iframe',
            'height' : 50,
            'width' : 320,
            'params' : {}
          };
        </script>
        <script type="text/javascript" src="https://www.highperformanceformat.com/16344688721b10a78e66849f98560991/invoke.js"></script>
    </div>
    <!-- ⬆️ TOP BANNER AD END ⬆️ -->


    <!-- मुख्य कार्ड -->
    <main class="card">
        <div class="image-container">
            <img src="giphy.gif" alt="शुभ ली उसव">
        </div>

        <h2 id="sender-greeting" class="glowing-text dynamic-name"></h2>
        <h1 class="glowing-text main-title">Happy Birthday</h1>

        <div class="wish-box">
            <p id="wish-message">Party Kab Dega Mere Bhai</p>
        </div>

        <div class="form-container">
            <label for="user-name">यहाँ अपना नाम लिखें:</label>
            <input type="text" id="user-name" placeholder="अपना नाम लिखें..." autocomplete="off" maxlength="25">
            
            <button id="share-btn" class="whatsapp-btn">
                <svg viewBox="0 0 24 24" class="whatsapp-icon">
                    <path fill="currentColor" d="M12.01 2c-5.52 0-10 4.48-10 10a9.96 9.96 0 0 0 1.25 4.87L2 22l5.31-1.39c1.43.78 3.06 1.21 4.7 1.21 5.52 0 10-4.48 10-10S17.53 2 12.01 2zm6.27 14.24c-.24.67-1.42 1.24-1.96 1.29-.54.06-1.07.24-3.46-.7-3.05-1.2-5-4.31-5.15-4.51-.15-.2-1.25-1.66-1.25-3.17 0-1.51.78-2.25 1.06-2.55.28-.3.61-.37.81-.37.2 0 .41 0 .58.01.18.01.42-.07.66.5.24.58.81 1.99.88 2.14.07.15.12.32.02.52-.1.2-.15.32-.3.5-.15.17-.31.39-.45.52-.15.15-.31.31-.13.62.18.3.8 1.31 1.71 2.12.1.09.2.14.31.14.11 0 .22-.05.33-.12.42-.3.92-.81 1.21-.92.29-.12.58-.07.82.04.24.12 1.54.73 1.8 1 .26.12.44.25.37.62z"/>
                </svg>
                WhatsApp पर शेयर करें
            </button>
        </div>
    </main>


    <!-- ⬇️ BOTTOM END AD ⬇️ -->
    <div class="ad-container">
        <script type="text/javascript" src="https://pl30091919.effectivecpmnetwork.com/56/ac/e0/56ace0cbc1ef2c54a683f82794b69559.js"></script>
    </div>
    <!-- ⬆️ BOTTOM END AD END ⬆️ -->


    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const senderGreetingEl = document.getElementById("sender-greeting");
            const nameInput = document.getElementById("user-name");
            const shareBtn = document.getElementById("share-btn");
            const audio = document.getElementById("bg-music");

            // --- 1. URL से नाम पढ़ना ---
            const urlParams = new URLSearchParams(window.location.search);
            const senderName = urlParams.get("name");

            if (senderName) {
                const decodedName = decodeURIComponent(senderName).trim();
                if (decodedName) {
                    senderGreetingEl.textContent = `${decodedName} की ओर से`;
                    document.title = `${decodedName} ने आपके लिए kuch संदेश भेजा है!`;
                }
            }

            // --- 2. WhatsApp शेयरिंग सिस्टम ---
            shareBtn.addEventListener("click", () => {
                const enteredName = nameInput.value.trim();

                if (!enteredName) {
                    alert("कृपया आगे बढ़ने के लिए अपना नाम लिखें!");
                    nameInput.focus();
                    return;
                }

                const baseUrl = window.location.origin + window.location.pathname;
                const encodedParam = encodeURIComponent(enteredName);
                const viralShareUrl = `${baseUrl}?name=${encodedParam}`;

                const shareMessage = `✨ *${enteredName}* ने आपके लिए एक बेहद खूबसूरत संदेश भेजा है! 🪔✨\n\nनीचे दिए गए नीले लिंक पर क्लिक करके अभी देखें 👇👇\n👉 ${viralShareUrl}`;

                const whatsappGatewayUrl = `https://api.whatsapp.com/send?text=${encodeURIComponent(shareMessage)}`;
                window.open(whatsappGatewayUrl, '_blank');
            });

            // --- 3. ऑटो-प्ले म्यूजिक ---
            let isMusicPlaying = false;
            function startMusic() {
                if (!isMusicPlaying) {
                    audio.play()
                        .then(() => { isMusicPlaying = true; })
                        .catch(err => console.log("Audio waiting for user interaction..."));
                }
            }
            document.body.addEventListener("click", startMusic, { once: true });
            document.body.addEventListener("touchstart", startMusic, { once: true });

            // --- 4. हाई-परफॉर्मेंस डायरेक्ट ब्लास्ट पटाखे ---
            const canvas = document.getElementById("fireworksCanvas");
            const ctx = canvas.getContext("2d");

            function resizeCanvas() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            window.addEventListener("resize", resizeCanvas);
            resizeCanvas();

            let particles = [];

            class Particle {
                constructor(x, y, hue) {
                    this.x = x;
                    this.y = y;
                    this.hue = hue + (Math.random() * 30 - 15);
                    this.alpha = 1;
                    this.decay = 0.02 + Math.random() * 0.02;
                    const angle = Math.random() * Math.PI * 2;
                    const speed = Math.random() * 4 + 1.5;
                    this.vx = Math.cos(angle) * speed;
                    this.vy = Math.sin(angle) * speed;
                    this.gravity = 0.05;
                }
                update() {
                    this.vy += this.gravity;
                    this.x += this.vx;
                    this.y += this.vy;
                    this.alpha -= this.decay;
                    return this.alpha > 0;
                }
                draw() {
                    ctx.save();
                    ctx.globalCompositeOperation = "lighter";
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, Math.random() * 2 + 0.8, 0, Math.PI * 2);
                    ctx.fillStyle = `hsla(${this.hue}, 100%, 65%, ${this.alpha})`;
                    ctx.fill();
                    ctx.restore();
                }
            }

            function triggerDirectExplosion() {
                const x = Math.random() * canvas.width;
                const y = Math.random() * (canvas.height * 0.7);
                const hue = Math.random() * 360;
                
                for (let i = 0; i < 35; i++) {
                    particles.push(new Particle(x, y, hue));
                }
            }

            function loop() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                if (Math.random() < 0.03 && particles.length < 120) {
                    triggerDirectExplosion();
                }

                particles = particles.filter(p => {
                    const isValid = p.update();
                    if (isValid) p.draw();
                    return isValid;
                });

                requestAnimationFrame(loop);
            }
            loop();
        });
    </script>
</body>
</html>
